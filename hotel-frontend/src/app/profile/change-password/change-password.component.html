
 <!-- BACKDROP -->
<div class="modal-backdrop"
     style="
       position: fixed;
       top: 0; left: 0; right: 0; bottom: 0;
       background: rgba(0,0,0,0.55);
       display: flex;
       justify-content: center;
       align-items: center;
     ">

  <!-- CARD STYLE MODAL -->
  <div class="modal-card shadow-lg p-4"
       style="
         width: 600px;
         max-width: 90%;
         background: white;
         border-radius: 14px;
       ">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="text-primary fw-bold m-0">Change Password</h4>
      <button type="button" class="btn-close" (click)="close.emit()"></button>
    </div>

    <!-- BODY -->

    <div class="mb-3">
      <label class="form-label fw-bold">Old Password</label>
      <input type="password"
             class="form-control form-control-lg"
             [(ngModel)]="oldPass">
    </div>

    <div class="mb-4">
      <label class="form-label fw-bold">New Password</label>
      <input type="password"
             class="form-control form-control-lg"
             [(ngModel)]="newPass">
    </div>

    <!-- FOOTER BUTTONS -->
    <div class="d-flex justify-content-end">
      <button class="btn btn-secondary me-2 px-4 py-2" (click)="close.emit()">
        Cancel
      </button>

      <button class="btn btn-success px-4 py-2" (click)="change()">
        Update Password
      </button>
    </div>

  </div>

</div>
