<h3>Bookmarked Hotels</h3>

<div class="row mt-3">
  <div class="col-md-4" *ngFor="let b of bookmarks">
    <div class="card p-3 shadow-sm mb-3">

      <h5>{{ b.hotelId.name }}</h5>
       <img 
          [src]="b.hotelId.images" 
          alt="Hotel Image"
          class="img-fluid rounded"
          style="width: 300px; height: 150px; object-fit: cover;"
          >
          <br>   

      <button class="btn btn-primary btn-sm mb-2"
      (click)="bookAgain(b)">
        Book Now
      </button>

      <button class="btn btn-danger btn-sm"
              (click)="remove(b._id)">
        Remove
      </button>

    </div>
  </div>
</div>

<app-booking-modal
  *ngIf="bookagain"
  [hotel]="bookagain.hotelId"
  (booked)="refresh(bookagain._id)"
  (close)="bookagain = null"
  >
</app-booking-modal>
